<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎮 Tic Tac Toe</h1>

<!-- Mode Selection -->
<div id="modePopup" class="popup" style="display:flex;">
  <div class="popup-content">
    <h2>Select Mode</h2>
    <button onclick="startGame('single')">Single Player</button>
    <button onclick="startGame('double')">Double Player</button>
  </div>
</div>

<!-- Scoreboard -->
<div class="scoreboard">
  <p>Player X: <span id="scoreX">0</span></p>
  <p>Player O: <span id="scoreO">0</span></p>
</div>

<!-- Game Board -->
<div class="game">
  <div class="cell" data-index="0"></div>
  <div class="cell" data-index="1"></div>
  <div class="cell" data-index="2"></div>
  <div class="cell" data-index="3"></div>
  <div class="cell" data-index="4"></div>
  <div class="cell" data-index="5"></div>
  <div class="cell" data-index="6"></div>
  <div class="cell" data-index="7"></div>
  <div class="cell" data-index="8"></div>
</div>

<div id="status">Choose a mode to start</div>

<!-- Winner Popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h2 id="popupText"></h2>
    <button onclick="newGame()">New Game</button>
  </div>
</div>
<!-- Add inside body (end) -->

<!-- Sounds -->
<audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4012c0a4b5.mp3"></audio>
<audio id="winSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f8f3fbb0b.mp3"></audio>
<audio id="drawSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_0b4f9e3b1e.mp3"></audio>
<script src="script.js"></script>
</body>
</html>
